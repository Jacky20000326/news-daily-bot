name: Daily Crypto Report
on:
  schedule:
    - cron: '0 1 * * *'   # 01:00 UTC = 09:00 Asia/Taipei
  workflow_dispatch:        # 允許手動觸發

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g pnpm && pnpm install --frozen-lockfile
      - run: pnpm build
      - run: ls -R dist/reporter/templates/
      - run: node dist/index.js
        env:
          NODE_ENV: production
          # ─── 必要 Secrets ───
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          # ─── 選填 Secrets ───
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          CRYPTOPANIC_TOKEN: ${{ secrets.CRYPTOPANIC_TOKEN }}
          GMAIL_WHITELIST: ${{ secrets.GMAIL_WHITELIST }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          GITHUB_TOKEN: ${{ secrets.GH_PAGES_TOKEN }}
          GITHUB_OWNER: ${{ secrets.GITHUB_OWNER }}
          GITHUB_REPO: ${{ secrets.GITHUB_REPO }}
